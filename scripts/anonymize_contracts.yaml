# anonymize_contracts.yaml
#
# PII anonymization configuration for the contracts app.
# Used by the anonymize_db script from loutilities.
#
# Usage:
#   anonymize_db -c scripts/anonymize_contracts.yaml \
#       --output-dir ./anon/ users.sql contracts.sql
#
# IMPORTANT: pass users.sql BEFORE contracts.sql so the user→localuser sync
# map is populated before localuser rows are processed.
#
# NOTE: The users DB is shared with other apps (members, etc.).
# The anonymized output is deterministic (seeded by row id), so if you are
# anonymizing multiple apps that share the same users DB you only need to
# load the anonymized users.sql once.
#
# Field types:
#   email       user{id}@example.com
#   fullname    Firstname{id} Lastname{id}
#   firstname   Firstname{id}
#   lastname    Lastname{id}
#   date_shift  date shifted by a deterministic random ±3 years (NULL preserved)
#   ip          127.0.0.1
#   text        'anonymized'
#   city        'Anytown'
#   fixed       literal value specified in the 'value' key
#   sync        copy the anonymized value from another table (see localuser below)
#
# NULL values are preserved for all types except 'fixed'.

tables:

  # -------------------------------------------------------------------------
  # users database  (users.sql)
  # -------------------------------------------------------------------------

  user:
    pk: id
    fields:
      email:
        type: email
      name:
        type: fullname
      given_name:
        type: firstname
      last_login_ip:
        type: ip
      current_login_ip:
        type: ip

  # -------------------------------------------------------------------------
  # contracts database  (contracts.sql)
  # -------------------------------------------------------------------------

  # localuser mirrors user via user_id; values must match what user got above.
  localuser:
    pk: id
    fields:
      email:
        type: sync
        source_table: user
        source_field: email
        join_field: user_id
      name:
        type: sync
        source_table: user
        source_field: name
        join_field: user_id
      given_name:
        type: sync
        source_table: user
        source_field: given_name
        join_field: user_id

  # Sales leads (race directors who enquired about finish-line services)
  lead:
    pk: id
    fields:
      name:
        type: fullname
      email:
        type: email
      phone:
        type: fixed
        value: '555-555-0000'

  # Race organisations / clients
  client:
    pk: id
    fields:
      contactFirstName:
        type: firstname
      contactLastName:
        type: lastname
      contactEmail:
        type: email
      ccEmails:
        type: fixed
        value: 'cc@example.com'
      clientPhone:
        type: fixed
        value: '555-555-0000'
      clientAddr:
        type: fixed
        value: '123 Main St'

  # Events: approver name/email recorded when contract is approved
  event:
    pk: id
    fields:
      contractApprover:
        type: fullname
      contractApproverEmail:
        type: email

  # Sponsorship records: race contact name
  sponsor:
    pk: id
    fields:
      racecontact:
        type: fullname

  # Sponsored races: race director contact details
  sponsorrace:
    pk: id
    fields:
      racedirector:
        type: fullname
      rdphone:
        type: fixed
        value: '555-555-0000'
      rdemail:
        type: email
      email:
        type: email
      email_from:
        type: email
      query_cc:
        type: fixed
        value: 'cc@example.com'
      agreement_cc:
        type: fixed
        value: 'cc@example.com'

  # Registration cache pulled from RunSignUp: individual registrant PII
  sponsorraceregcache:
    pk: id
    fields:
      first_name:
        type: firstname
      last_name:
        type: lastname
      email:
        type: email
      dob:
        type: date_shift

  # Log of public sponsor-query form submissions
  sponsorquerylog:
    pk: id
    fields:
      name:
        type: fullname
      email:
        type: email
      phone:
        type: fixed
        value: '555-555-0000'
      street:
        type: fixed
        value: '123 Main St'
      city:
        type: city
      state:
        type: fixed
        value: 'CA'
      zipcode:
        type: fixed
        value: '00000'
